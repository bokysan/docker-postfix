name: 'Login to GitHub Container Registry'
description: 'Login to ghcr.io using the workflow token'

runs:
  using: "composite"
  steps:
    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: '${{ github.repository_owner }}'
        password: '${{ github.token }}'
