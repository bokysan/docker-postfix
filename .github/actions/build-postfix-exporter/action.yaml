name: 'Build the postfix-exporter'
description: 'Build the latest version of postfix-exporter'

inputs:
  DOCKER_ACCESS_TOKEN:
    description: 'DOCKER_ACCESS_TOKEN'
    required: false
  tags:
    description: 'Docker image tags'
    required: true
  push:
    description: 'Push to docker registry'
    required: false
    default: true

runs:
  using: "composite"
  steps:
    # When a token is available (always on CI, and locally under `act` when
    # act.sh could borrow one from the gh CLI): use actions/checkout.
    - name: Checkout
      if: ${{ github.token != '' }}
      uses: actions/checkout@v4
      with:
        repository: Hsn723/postfix_exporter
        path: 'postfix_exporter'
        ref: 'v0.20.4' # Latest commit we know that works

    # No token (e.g. local `act` run without an authenticated gh CLI): fall back
    # to a plain anonymous clone so local development doesn't stall.
    - name: Checkout (local, no token)
      if: ${{ github.token == '' }}
      shell: bash
      run: |
        git clone --depth 1 --branch v0.20.4 \
          https://github.com/Hsn723/postfix_exporter postfix_exporter

    - name: Apply patches
      shell: bash
      run: |
        cd postfix_exporter
        git apply ../postfix-exporter-*.patch

    # Docker hub login
    - uses: ./.github/actions/docker-hub-login
      with:
        DOCKER_ACCESS_TOKEN: '${{ inputs.DOCKER_ACCESS_TOKEN }}'

    # GitHub container registry login
    - uses: ./.github/actions/ghcr-login

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          boky/postfix-exporter
          ghcr.io/bokysan/postfix-exporter

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-postfix-exporter-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-postfix-exporter-

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: postfix_exporter
        push: ${{ inputs.push }}
        tags: '${{ inputs.tags }}'
        labels: ${{ steps.meta.outputs.labels }}
        platforms: "linux/arm/v7,linux/amd64,linux/arm64,linux/riscv64,linux/ppc64le,linux/s390x"
        cache-from: type=local,src=/tmp/.buildx-cache/postfix-exporter,mode=max,compression=estargz
        cache-to: type=local,dest=/tmp/.buildx-cache-new/postfix-exporter

    - name: Move cache
      shell: bash
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache
