# Bayes statistics are intentionally disabled in this image.
#
# This is an outbound DKIM-signing relay: it does not classify mail as spam, and
# the default bayes classifier requires an external Redis (which this image does
# not ship). The stock statistic.conf defines a `classifier "bayes"` block that
# would emit a Redis error for every message, so we replace it with this empty
# file.
#
# To re-enable bayes, mount your own /etc/rspamd/statistic.conf and point rspamd
# at a Redis server via /etc/rspamd/local.d/redis.conf (or RSPAMD_redis__servers).
