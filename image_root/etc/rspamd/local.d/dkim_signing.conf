# DKIM signing for outbound mail.
#
# The list of domains, their selectors and key paths is generated at container
# startup (see the `rspamd_*` functions in /scripts/functions.sh) into the two
# map files referenced below. This mirrors OpenDKIM's KeyTable / SigningTable so
# that keys imported from OpenDKIM keep working. The maps are rewritten on every
# boot; this file itself is safe to override (mount your own) -- it is never
# regenerated.
enabled = true;

# Sign every message this relay handles, regardless of authentication status or
# the network it came from. An outbound relay signs on behalf of its senders.
sign_authenticated = true;
sign_local = true;
# Inline radix map: sign mail from any source this relay accepts. Postfix's own
# restrictions already limit who may submit, so signing everything is correct
# for an outbound relay. Must be an array -- a bare string is parsed as a map URI.
sign_networks = ["0.0.0.0/0"];

# Be lenient: the envelope/header From may legitimately differ for a relay.
allow_hdrfrom_mismatch = true;
allow_hdrfrom_mismatch_sign_networks = true;
allow_username_mismatch = true;
use_domain = "header";

# Per-domain selector and private-key path, generated at startup.
selector_map = "/etc/rspamd/dkim_selectors.map";
path_map = "/etc/rspamd/dkim_paths.map";
