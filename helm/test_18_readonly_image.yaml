container:
    postfix:
        securityContext:
            readOnlyRootFilesystem: true

extraVolumes:
    - name: postfix-data
      emptyDir: {}
    - name: opendkim-data
      emptyDir: {}
    - name: rspamd-config
      emptyDir: {}
    - name: rspamd-data
      emptyDir: {}
    - name: var-run
      emptyDir: {}
    - name: var-lib-postfix
      emptyDir: {}

extraVolumeMounts:
    - name: postfix-data
      mountPath: /etc/postfix
    - name: opendkim-data
      mountPath: /etc/opendkim
    - name: rspamd-config
      mountPath: /etc/rspamd
    - name: rspamd-data
      mountPath: /var/lib/rspamd
    - name: var-run
      mountPath: /var/run
    - name: var-lib-postfix
      mountPath: /var/lib/postfix