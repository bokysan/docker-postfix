services:
  postfix_test_587:
    hostname: "postfix"
    image: "boky/postfix"
    restart: always
    healthcheck:
      test: [ "CMD", "sh", "-c", "netstat -an | fgrep 587 | fgrep -q LISTEN" ]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 2
    volumes:
      # Existing OpenDKIM keys -- these must be automatically imported into rspamd.
      - "../basic-test/test-keys:/etc/opendkim/keys"
    environment:
      FORCE_COLOR: "1"
      DKIM_BACKEND: "rspamd"
      ALLOWED_SENDER_DOMAINS: "example.org"
  tests:
    image: "boky/postfix-integration-test"
    restart: "no"
    volumes:
      - "../tester:/code"
    build:
      context: ../tester
    command: "/code" # run the bats tests mounted at /code
    environment:
      FROM: "demo@example.org"
      TO: "test@gmail.com"
