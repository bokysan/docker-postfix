services:
  postfix_test_587:
    hostname: "postfix"
    image: "boky/postfix"
    restart: always
    read_only: true
    healthcheck:
      test: [ "CMD", "sh", "-c", "netstat -an | fgrep 587 | fgrep -q LISTEN" ]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 2
    tmpfs:
      - "/tmp/"
      - "/var/spool/postfix"
      - "/etc/postfix"
      # Postfix needs a writable data dir (master.lock) and runtime dir.
      - "/var/lib/postfix"
      - "/var/run"
      # rspamd writes its config maps here and stores DKIM keys under /var/lib/rspamd.
      - "/etc/rspamd"
      - "/var/lib/rspamd"
    environment:
      FORCE_COLOR: "1"
      DKIM_BACKEND: "rspamd"
      ALLOWED_SENDER_DOMAINS: "example.org"
      DKIM_AUTOGENERATE: "true"
  tests:
    image: "boky/postfix-integration-test"
    restart: "no"
    volumes:
      - "../tester:/code"
    build:
      context: ../tester
    command: "/code" # run the bats tests mounted at /code
    environment:
      FROM: "demo@example.org"
      TO: "test@gmail.com"
