services:
  postfix_test_587:
    hostname: "postfix"
    image: "boky/postfix"
    restart: always
    read_only: true
    healthcheck:
      test: [ "CMD", "sh", "-c", "netstat -an | fgrep 587 | fgrep -q LISTEN" ]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 2
    volumes:
      - "./test-keys:/etc/opendkim/keys"
      - "./docker-init.d:/docker-init.d/"
    tmpfs:
      - "/tmp/"
      - "/var/spool/postfix"
      - "/etc/postfix"
      # OpenDKIM writes its runtime config here (opendkim.conf, KeyTable,
      # SigningTable, TrustedHosts), so it must be writable on a read-only image.
      - "/etc/opendkim"
      # Postfix needs a writable data dir (master.lock etc.) and runtime dir.
      - "/var/lib/postfix"
      - "/var/run"
    environment:
      FORCE_COLOR: "1"
      DKIM_BACKEND: "opendkim"
      OPENDKIM_Canonicalization: "relaxed/relaxed"
      ALLOWED_SENDER_DOMAINS: "example.org"
  tests:
    image: "boky/postfix-integration-test"
    restart: "no"
    volumes:
      - "../tester:/code"
    build:
      context: ../tester
    command: "/code" # run the bats tests mounted at /code
    environment:
      FROM: "demo@example.org"
      TO: "test@gmail.com"